<!DOCTYPE html>
<html>
<head>
  <h1 style="color:white">TEST</h1>
  <meta charset="UTF-8" />
  <title>Glucose Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
 <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.min.js"></script>
  <style>
    body { margin:0; background:#0f1520; color:#c8d8e8; font-family: monospace; }
    input, button { font-family: inherit; }
    
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

    function App() {
      const [data, setData] = useState([]);
      const [value, setValue] = useState("");

      useEffect(() => {
        const saved = localStorage.getItem("glucose");
        if (saved) setData(JSON.parse(saved));
      }, []);

      function add() {
        if (!value) return;
        const entry = { v: Number(value), t: new Date().toLocaleTimeString() };
        const next = [entry, ...data];
        setData(next);
        localStorage.setItem("glucose", JSON.stringify(next));
        setValue("");
      }

      return (
        React.createElement("div", { style:{padding:"20px"} },
          React.createElement("h2", null, "Glucose Tracker"),

          React.createElement("input", {
            type:"number",
            placeholder:"mg/dL",
            value:value,
            onChange:e=>setValue(e.target.value)
          }),

          React.createElement("button", { onClick:add, style:{marginLeft:10} }, "Add"),

          React.createElement("div", { style:{height:300, marginTop:20} },
            React.createElement(ResponsiveContainer, null,
              React.createElement(LineChart, { data:data.slice().reverse() },
                React.createElement(CartesianGrid, { stroke:"#333" }),
                React.createElement(XAxis, { dataKey:"t" }),
                React.createElement(YAxis, null),
                React.createElement(Tooltip, null),
                React.createElement(Line, { type:"monotone", dataKey:"v", stroke:"#5cb88a" })
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
